flutter_native_splash:
  # Roasted Cocoa — must match the Flutter splash background (ChurchColors.button).
  color: "#633A02"

  # A pre-sized 640px source. flutter_native_splash treats the image as the
  # xxxhdpi (4x) asset, so 640 / 4 renders the emblem at ~160dp — big enough to
  # match the Flutter splash's resting emblem exactly, for an invisible handoff.
  # (The full-resolution master lives at assets/images/logo.png for the in-app
  # emblem and launcher icons; this is the splash-sized derivative.)
  image: assets/images/splash_logo.png

  android: true
  ios: true
  web: false
  fullscreen: true # Hides the status bar during the native splash.

  # Android 12+ renders the splash icon in a fixed OS window (~240dp), so the
  # emblem is a touch smaller there by platform decree; the Flutter splash
  # smooths that over immediately after handoff.
  android_12:
    color: "#633A02"
    image: assets/images/splash_logo.png
